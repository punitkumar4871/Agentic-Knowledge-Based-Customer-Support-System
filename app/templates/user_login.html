<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KGB — Customer Portal Login</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: auto;
        }

        .auth-box {
            width: 100%;
            max-width: 440px;
            margin: 24px;
            background: var(--navy-deep);
            border: 1px solid var(--navy-rim-hi);
            border-radius: 12px;
            overflow: hidden;
            position: relative;
        }

        .auth-box::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 3px;
            background: linear-gradient(90deg, transparent, #34d399, transparent);
        }

        /* Tab switcher */
        .auth-tabs {
            display: grid;
            grid-template-columns: 1fr 1fr;
            border-bottom: 1px solid var(--navy-rim);
        }

        .auth-tab {
            padding: 16px;
            text-align: center;
            font-family: 'Syne', sans-serif;
            font-size: 0.72rem;
            font-weight: 600;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            color: var(--white-ghost);
            cursor: pointer;
            transition: color 0.2s, background 0.2s;
            border: none;
            background: transparent;
            border-bottom: 2px solid transparent;
            margin-bottom: -1px;
        }

        .auth-tab.active {
            color: #34d399;
            border-bottom-color: #34d399;
            background: rgba(52,211,153,0.04);
        }

        .auth-tab:hover:not(.active) {
            color: var(--white-dim);
            background: rgba(255,255,255,0.02);
        }

        .auth-inner {
            padding: 36px 36px 32px;
            display: flex;
            flex-direction: column;
            gap: 22px;
        }

        .auth-brand {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            text-align: center;
        }

        .auth-kgb {
            font-family: 'Syne', sans-serif;
            font-weight: 800;
            font-size: 1.3rem;
            letter-spacing: 0.25em;
            color: var(--amber);
            border: 1px solid var(--amber-border);
            padding: 5px 14px;
            border-radius: 4px;
            background: var(--amber-trace);
        }

        .auth-brand h2 {
            font-family: 'Syne', sans-serif;
            font-size: 1rem;
            font-weight: 600;
            color: var(--white);
        }

        .auth-brand p {
            font-size: 0.72rem;
            color: var(--white-ghost);
            letter-spacing: 0.1em;
            text-transform: uppercase;
        }

        .form-panel {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .form-panel.hidden { display: none; }

        .field-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .field-group label {
            font-size: 0.68rem;
            font-weight: 500;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            color: var(--white-dim);
        }

        .field-group input {
            background: rgba(10,18,37,0.8);
            border: 1px solid var(--navy-rim-hi);
            border-radius: 6px;
            padding: 12px 16px;
            color: var(--white);
            font-family: 'IBM Plex Sans', sans-serif;
            font-size: 0.88rem;
            font-weight: 300;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
            width: 100%;
        }

        .field-group input:focus {
            border-color: rgba(52,211,153,0.45);
            box-shadow: 0 0 0 3px rgba(52,211,153,0.08);
        }

        .error-msg {
            padding: 10px 14px;
            background: rgba(248,113,113,0.1);
            border: 1px solid rgba(248,113,113,0.3);
            border-radius: 6px;
            font-size: 0.8rem;
            color: #f87171;
        }

        .auth-btn {
            font-family: 'Syne', sans-serif;
            font-weight: 700;
            font-size: 0.82rem;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            border: none;
            border-radius: 6px;
            padding: 14px;
            cursor: pointer;
            width: 100%;
            transition: transform 0.15s, box-shadow 0.2s, background 0.2s;
            background: #34d399;
            color: var(--midnight);
        }

        .auth-btn:hover {
            background: #6ee7b7;
            transform: translateY(-1px);
            box-shadow: 0 0 20px rgba(52,211,153,0.2);
        }

        .auth-divider {
            display: flex;
            align-items: center;
            gap: 12px;
            color: var(--white-ghost);
            font-size: 0.7rem;
        }

        .auth-divider::before,
        .auth-divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--navy-rim-hi);
        }

        .auth-footer {
            text-align: center;
            font-size: 0.72rem;
            color: var(--white-ghost);
            padding-bottom: 4px;
        }

        .auth-footer a {
            color: var(--white-dim);
            text-decoration: none;
            transition: color 0.2s;
        }

        .auth-footer a:hover { color: #34d399; }

        .register-note {
            font-size: 0.72rem;
            color: var(--white-ghost);
            line-height: 1.5;
            padding: 10px 14px;
            background: rgba(52,211,153,0.04);
            border: 1px solid rgba(52,211,153,0.1);
            border-radius: 5px;
        }
    </style>
</head>
<body>

<div class="auth-box">

    <div class="auth-tabs">
        <button class="auth-tab active" id="tab-login" onclick="switchTab('login')">Sign In</button>
        <button class="auth-tab" id="tab-register" onclick="switchTab('register')">Register</button>
    </div>

    <div class="auth-inner">

        <div class="auth-brand">
            <div class="auth-kgb">KGB</div>
            <h2>Customer Support Portal</h2>
            <p>IT Issue Reporting System</p>
        </div>

        {% if error %}
        <div class="error-msg">⚠ {{ error }}</div>
        {% endif %}

        <!-- LOGIN FORM -->
        <form method="POST" action="/user-login" id="loginForm">
            <input type="hidden" name="action" value="login">
            <div class="form-panel" id="panel-login">
                <div class="field-group">
                    <label>Email Address</label>
                    <input type="email" name="email" placeholder="you@company.com" required autocomplete="email">
                </div>
                <div class="field-group">
                    <label>Password</label>
                    <input type="password" name="password" placeholder="••••••••" required autocomplete="current-password">
                </div>
                <button type="submit" class="auth-btn">→ &nbsp;Sign In</button>
            </div>
        </form>

        <!-- REGISTER FORM -->
        <form method="POST" action="/user-login" id="registerForm" style="display:none;">
            <input type="hidden" name="action" value="register">
            <div class="form-panel" id="panel-register">
                <div class="register-note">
                    Create a free account to submit support tickets and track them permanently — even across sessions.
                </div>
                <div class="field-group">
                    <label>Full Name</label>
                    <input type="text" name="name" placeholder="Jane Smith" required autocomplete="name">
                </div>
                <div class="field-group">
                    <label>Email Address</label>
                    <input type="email" name="email" placeholder="you@company.com" required autocomplete="email">
                </div>
                <div class="field-group">
                    <label>Password</label>
                    <input type="password" name="password" placeholder="Choose a secure password" required autocomplete="new-password" minlength="6">
                </div>
                <button type="submit" class="auth-btn" style="background:#34d399;">✓ &nbsp;Create Account</button>
            </div>
        </form>

        <div class="auth-footer">
            <a href="/">← Back to Gateway</a>
        </div>

    </div>
</div>

<script>
    function switchTab(tab) {
        document.getElementById('tab-login').classList.toggle('active', tab === 'login');
        document.getElementById('tab-register').classList.toggle('active', tab === 'register');
        document.getElementById('loginForm').style.display    = tab === 'login'    ? '' : 'none';
        document.getElementById('registerForm').style.display = tab === 'register' ? '' : 'none';
    }

    // Auto-open the register tab if the error came from a register attempt
    // We detect this by checking which hidden action field was submitted
    const lastAction = sessionStorage.getItem('kgb_last_auth_action') || 'login';
    if (lastAction === 'register') switchTab('register');

    document.getElementById('loginForm').addEventListener('submit', () => {
        sessionStorage.setItem('kgb_last_auth_action', 'login');
    });
    document.getElementById('registerForm').addEventListener('submit', () => {
        sessionStorage.setItem('kgb_last_auth_action', 'register');
    });
</script>

</body>
</html>
